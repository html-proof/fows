[supervisord]
user=root
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:node-api]
command=node --max-old-space-size=300 /app/index.js
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
environment=NODE_ENV="production",PORT="%(ENV_PORT)s",MALLOC_ARENA_MAX="2"

[program:ml-service]
command=/opt/ml-venv/bin/uvicorn main:app --host 127.0.0.1 --port %(ENV_ML_SERVICE_PORT)s --workers 1
directory=/app/ml-service
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
environment=TF_CPP_MIN_LOG_LEVEL="3",OMP_NUM_THREADS="1",TF_NUM_INTRAOP_THREADS="1",TF_NUM_INTEROP_THREADS="1"
